<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>字幕时间轴播放器</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="video-panel">
        <header class="panel-header">
          <div>
            <p class="eyebrow">Local Timeline Player</p>
            <h1 id="projectTitle">字幕时间轴播放器</h1>
          </div>
          <button id="reloadDefaultButton" class="ghost-button" type="button">加载默认素材</button>
        </header>

        <div class="picker-row">
          <label class="picker picker-folder">
            <span>选择本地文件夹</span>
            <input id="folderInput" type="file" webkitdirectory multiple>
          </label>
        </div>

        <div class="action-row">
          <button id="previousSegmentButton" class="ghost-button" type="button">上一条 [</button>
          <button id="nextSegmentButton" class="ghost-button" type="button">下一条 ]</button>
          <label class="toggle-chip" for="subtitleVisibleInput">
            <input id="subtitleVisibleInput" type="checkbox">
            <span>显示字幕</span>
          </label>
          <a id="downloadVttLink" class="ghost-button ghost-link is-disabled" aria-disabled="true">下载 VTT</a>
          <button
            id="openLibraryButton"
            class="ghost-button"
            type="button"
            aria-haspopup="dialog"
            aria-controls="libraryModal"
            aria-expanded="false"
          >视频列表</button>
          <button id="setRepeatStartButton" class="ghost-button repeat-point-button" type="button">
            <span>设 A 点</span>
            <span id="repeatStartValue" class="repeat-point-meta">未设置</span>
          </button>
          <button id="setRepeatEndButton" class="ghost-button repeat-point-button" type="button">
            <span>设 B 点</span>
            <span id="repeatEndValue" class="repeat-point-meta">未设置</span>
          </button>
          <button id="clearRepeatButton" class="ghost-button" type="button">取消</button>
        </div>

        <p class="shortcut-hint">快捷键：`[` 跳上一条，`]` 跳下一条</p>

        <div class="video-card">
          <video id="videoPlayer" controls preload="metadata"></video>
        </div>

        <section class="library-bar" aria-label="media library summary">
          <div class="library-bar-copy">
            <p class="eyebrow">Media Library</p>
            <p id="librarySummary" class="library-summary library-summary-inline">当前未加载默认项目</p>
          </div>
        </section>

        <div class="status-grid">
          <div class="status-item">
            <span class="status-label">媒体</span>
            <strong id="videoSourceLabel">未加载</strong>
          </div>
          <div class="status-item">
            <span class="status-label">字幕源</span>
            <strong id="markdownSourceLabel">未加载</strong>
          </div>
          <div class="status-item">
            <span class="status-label">片段数</span>
            <strong id="segmentCountLabel">0</strong>
          </div>
          <div class="status-item">
            <span class="status-label">当前时间</span>
            <strong id="currentTimeLabel">00:00:00</strong>
          </div>
          <div class="status-item">
            <span class="status-label">VTT 字幕</span>
            <strong id="subtitleTrackLabel">未生成</strong>
          </div>
          <div class="status-item">
            <span class="status-label">重复区间</span>
            <strong id="repeatStatusLabel">未启用</strong>
          </div>
        </div>

        <p id="statusMessage" class="status-message">正在读取默认配置…</p>
      </section>

      <aside class="timeline-panel">
        <header class="panel-header timeline-header">
          <div>
            <p class="eyebrow">Segments</p>
            <h2>时间轴与字幕</h2>
          </div>
          <label class="follow-toggle">
            <input id="followPlaybackInput" type="checkbox" checked>
            <span>跟随播放滚动</span>
          </label>
        </header>

        <div class="search-row">
          <input id="searchInput" type="search" placeholder="搜索字幕内容">
          <p id="searchSummary">显示全部片段</p>
        </div>

        <ol id="segmentList" class="segment-list"></ol>
      </aside>
    </main>

    <div id="libraryModal" class="modal-shell" hidden>
      <div class="modal-backdrop" data-close-modal="true"></div>

      <section
        class="library-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="libraryModalTitle"
      >
        <header class="library-modal-header">
          <div>
            <p class="eyebrow">Media Library</p>
            <h3 id="libraryModalTitle">视频列表</h3>
          </div>

          <div class="library-modal-actions">
            <p id="modalLibrarySummary" class="library-summary library-summary-modal">当前未加载默认项目</p>
            <button id="closeLibraryButton" class="ghost-button" type="button">关闭</button>
          </div>
        </header>

        <ul id="mediaList" class="media-list media-list-modal"></ul>
        <p id="mediaEmptyState" class="media-empty">选择一个本地文件夹后，这里会显示匹配成功的视频和字幕列表。</p>
      </section>
    </div>

    <template id="segmentItemTemplate">
      <li class="segment-item">
        <button class="segment-button" type="button">
          <span class="segment-time"></span>
          <span class="segment-text"></span>
        </button>
      </li>
    </template>

    <template id="mediaItemTemplate">
      <li class="media-item">
        <button class="media-button" type="button">
          <span class="media-title"></span>
          <span class="media-meta"></span>
        </button>
      </li>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
